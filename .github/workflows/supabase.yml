name: Supabase CI / CD

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'supabase/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Forçar Deploy para Produção"
        required: false
        type: boolean
        default: false

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - name: Start local Supabase instance
        run: supabase start

      - name: Verify migrations (Lint)
        run: supabase db lint

      - name: Run DB Tests (pgTAP)
        run: |
          if [ -d "supabase/tests" ] && [ "$(ls -A supabase/tests)" ]; then
            supabase test db
          else
            echo "No tests found in supabase/tests. Skipping pgTAP."
          fi

      - name: Lint Edge Functions
        run: |
          if [ -d "supabase/functions" ]; then
            deno lint supabase/functions
          else
            echo "No functions found. Skipping Deno lint."
          fi

      - name: Type-check Edge Functions
        run: |
          if [ -d "supabase/functions" ]; then
            find supabase/functions -name "index.ts" -print0 | xargs -0 -r deno check --config supabase/functions/deno.json --no-npm
          else
            echo "No functions found. Skipping Deno check."
          fi

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    # Corre apenas se for push para a main, OU se for um workflow_dispatch e a checkbox force_deploy estiver ativa
    if: |
      always() && 
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      ((github.ref == 'refs/heads/main' && github.event_name == 'push') || 
       (github.event_name == 'workflow_dispatch' && inputs.force_deploy == true))
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Check Secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Faltam configurar os Secrets no GitHub (SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD)"
            exit 1
          fi

      - name: Link to Supabase Project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID --password $SUPABASE_DB_PASSWORD

      - name: Push DB Migrations
        run: supabase db push

      - name: Deploy Edge Functions
        run: |
          if [ -d "supabase/functions" ] && [ "$(ls -A supabase/functions)" ]; then
            supabase functions deploy
          else
            echo "No functions found in supabase/functions. Skipping deploy."
          fi

      - name: Generate TypeScript Types
        run: supabase gen types typescript --linked > supabase_types.ts

      - name: Checkout Frontend Repository
        uses: actions/checkout@v4
        with:
          repository: Geras-CBL/Geras
          path: frontend-repo
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update Types in Frontend
        run: |
          mkdir -p frontend-repo/geras/types
          cp supabase_types.ts frontend-repo/geras/types/supabase.ts
          cd frontend-repo/geras
          npx prettier@3 --write types/supabase.ts

      - name: Create Pull Request in Frontend
        uses: peter-evans/create-pull-request@v6
        with:
          path: frontend-repo
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "chore: update supabase types"
          title: "Update Supabase Types"
          body: "Automated PR to update Supabase TypeScript definitions after backend deployment."
          branch: "chore/update-supabase-types"